services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - '3000:3000'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_DEFAULT_RACE_SOURCE: server
        VITE_DEMO_AUTOLOAD_RACE: 'true'
    ports:
      - '5173:80'
    depends_on:
      backend:
        condition: service_healthy
